name: Slugger Issue to Codex Bridge

on:
  issues:
    types: [labeled]

concurrency:
  group: issue-to-codex-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  preflight:
    name: Validate approved Slugger issue
    if: github.event.label.name == 'codex-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      actions: read
    outputs:
      idea: ${{ steps.contract.outputs.idea }}
      project_name: ${{ steps.contract.outputs.project_name }}
      target_repository: ${{ steps.contract.outputs.target_repository }}
      source_issue_number: ${{ steps.contract.outputs.source_issue_number }}
      source_issue_url: ${{ steps.contract.outputs.source_issue_url }}
      request_identity: ${{ steps.contract.outputs.request_identity }}
    steps:
      - name: Check out Slugger default branch configuration
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Validate issue contract and approval
        id: contract
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          ISSUE_PULL_REQUEST: ${{ toJSON(github.event.issue.pull_request) }}
          ACTOR: ${{ github.actor }}
          AUTHORIZED_CODEX_READY_ACTORS: ${{ vars.AUTHORIZED_CODEX_READY_ACTORS }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          SLUGGER_TARGET_ALLOWLIST: .github/slugger/target-allowlist.json
          WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          : > issue-bridge-error.txt
          fail() { printf '%s' "$1" > issue-bridge-error.txt; echo "$1" >&2; exit 1; }
          [ "$ISSUE_PULL_REQUEST" = "null" ] || fail "Issue-to-Codex accepts issues only; pull requests are rejected."
          [ "$ISSUE_STATE" = "open" ] || fail "Issue must be open before codex-ready approval."
          [ "$REF_NAME" = "$DEFAULT_BRANCH" ] || fail "Issue-to-Codex must run from the default branch."
          [ -n "${AUTHORIZED_CODEX_READY_ACTORS:-}" ] || fail "AUTHORIZED_CODEX_READY_ACTORS repository variable is required."
          ISSUE_BODY_FILE="$RUNNER_TEMP/issue-body.md"
          printf '%s' "$ISSUE_BODY" > "$ISSUE_BODY_FILE"
          export ISSUE_BODY_FILE
          if ! python - <<'PY' 2> issue-bridge-error.txt
          import os
          from mvp.issue_bridge import IssueBridgeError, actor_is_authorized, main
          if not actor_is_authorized(os.environ["ACTOR"], os.environ["AUTHORIZED_CODEX_READY_ACTORS"]):
              raise SystemExit("Actor applying codex-ready is not authorized.")
          try:
              main()
          except IssueBridgeError as exc:
              raise SystemExit(str(exc)) from exc
          PY
          then
            cat issue-bridge-error.txt >&2
            exit 1
          fi
          REQUEST_IDENTITY="$(python - <<'PY'
          from pathlib import Path
          import os
          text = Path(os.environ['GITHUB_OUTPUT']).read_text(encoding='utf-8')
          marker='request_identity<<SLUGGER_REQUEST_IDENTITY_EOF\n'
          print(text.split(marker,1)[1].split('\nSLUGGER_REQUEST_IDENTITY_EOF',1)[0])
          PY
          )"
          comments="$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments --paginate --jq '.[].body')"
          if printf '%s\n' "$comments" | grep -F "Slugger request identity: $REQUEST_IDENTITY" >/dev/null; then
            fail "An active or completed execution already exists for this unchanged issue revision."
          fi
      - name: Report validation failure
        if: steps.contract.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          error_summary="$(head -c 500 issue-bridge-error.txt 2>/dev/null || true)"
          gh issue edit "$ISSUE_NUMBER" --add-label codex-failed
          ERROR_SUMMARY="$error_summary" python - <<'PY'
          import os
          from pathlib import Path

          summary = os.environ.get("ERROR_SUMMARY") or "Validation failed before Codex generation."
          lines = [
              "### Slugger Codex automation failed",
              "",
              f"- Workflow run URL: {os.environ['WORKFLOW_RUN_URL']}",
              "- Failed phase: preflight-validation",
              f"- Sanitized error summary: {summary}",
              "- Codex generation started: no",
              "- Publication occurred: no",
              "- Recommended corrective action: fix the synchronized issue contract or approval configuration, then apply a new explicit codex-ready label.",
          ]
          Path("issue-comment.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
      - name: Stop after failed validation
        if: steps.contract.outcome != 'success'
        run: exit 1
      - name: Mark issue running
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh issue edit "${{ github.event.issue.number }}" --add-label codex-running

  run-canonical-codex:
    name: Run canonical user idea Codex workflow
    needs: preflight
    uses: ./.github/workflows/user-idea-codex-cli-demo.yml
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    with:
      idea: ${{ needs.preflight.outputs.idea }}
      project_name: ${{ needs.preflight.outputs.project_name }}
      target_repository: ${{ needs.preflight.outputs.target_repository }}
      retain_diagnostics: true
      source_issue_number: ${{ needs.preflight.outputs.source_issue_number }}
      source_issue_url: ${{ needs.preflight.outputs.source_issue_url }}
      request_identity: ${{ needs.preflight.outputs.request_identity }}

  report-result:
    name: Report Slugger issue result
    if: always() && needs.preflight.result == 'success'
    needs: [preflight, run-canonical-codex]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Update labels and comment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TARGET_REPOSITORY: ${{ needs.preflight.outputs.target_repository }}
          REQUEST_IDENTITY: ${{ needs.preflight.outputs.request_identity }}
          CODEX_RESULT: ${{ needs.run-canonical-codex.result }}
          GENERATED_BRANCH: ${{ needs.run-canonical-codex.outputs.generated_branch }}
          DRAFT_PR_URL: ${{ needs.run-canonical-codex.outputs.draft_pull_request_url }}
          SLUGGER_RUN_ID: ${{ needs.run-canonical-codex.outputs.slugger_run_id }}
          VALIDATION_RESULT: ${{ needs.run-canonical-codex.outputs.validation_result }}
          TEST_RESULT: ${{ needs.run-canonical-codex.outputs.test_result }}
          SMOKE_RESULT: ${{ needs.run-canonical-codex.outputs.smoke_result }}
          MANIFEST_DIGEST: ${{ needs.run-canonical-codex.outputs.manifest_digest }}
        run: |
          set -uo pipefail
          successes=0
          failures=0
          run_report_action() {
            local description="$1"
            shift
            echo "Reporting action: ${description}"
            if "$@"; then
              successes=$((successes + 1))
            else
              rc=$?
              failures=$((failures + 1))
              echo "Reporting action failed (${description}) with exit code ${rc}." >&2
            fi
          }

          run_report_action "remove codex-running label" gh issue edit "$ISSUE_NUMBER" --remove-label codex-running

          if [ "$CODEX_RESULT" = "success" ]; then
            RESULT_LABEL="codex-complete"
          else
            RESULT_LABEL="codex-failed"
          fi
          run_report_action "add ${RESULT_LABEL} label" gh issue edit "$ISSUE_NUMBER" --add-label "$RESULT_LABEL"

          python - <<'PY'
          import os
          from pathlib import Path

          def value(name: str, default: str = "unavailable") -> str:
              return os.environ.get(name) or default

          if os.environ["CODEX_RESULT"] == "success":
              lines = [
                  "### Slugger Codex automation complete",
                  "",
                  f"- Workflow run URL: {value('WORKFLOW_RUN_URL')}",
                  f"- Slugger run ID: {value('SLUGGER_RUN_ID')}",
                  f"- Target repository: {value('TARGET_REPOSITORY')}",
                  f"- Generated branch: {value('GENERATED_BRANCH')}",
                  f"- Draft pull request URL: {value('DRAFT_PR_URL')}",
                  f"- Validation result: {value('VALIDATION_RESULT')}",
                  f"- Test result: {value('TEST_RESULT')}",
                  f"- Smoke result: {value('SMOKE_RESULT')}",
                  f"- Manifest digest: {value('MANIFEST_DIGEST')}",
                  "- Completion status: codex-complete",
                  "",
                  f"Slugger request identity: {value('REQUEST_IDENTITY')}",
              ]
          else:
              lines = [
                  "### Slugger Codex automation failed",
                  "",
                  f"- Workflow run URL: {value('WORKFLOW_RUN_URL')}",
                  "- Failed phase: canonical-user-idea-workflow",
                  f"- Sanitized error summary: Canonical reusable workflow concluded with {value('CODEX_RESULT', 'unknown')}.",
                  "- Codex generation started: see canonical workflow job results",
                  "- Publication occurred: no confirmed successful publication",
                  "- Recommended corrective action: inspect sanitized workflow diagnostics, correct configuration or generated project failures, then apply a new explicit codex-ready approval.",
                  "",
                  f"Slugger request identity: {value('REQUEST_IDENTITY')}",
              ]
          Path("issue-comment.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          run_report_action "post result comment" gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md

          if [ "$successes" -eq 0 ]; then
            echo "Every Slugger issue reporting action failed." >&2
            exit 1
          fi
          if [ "$failures" -gt 0 ]; then
            echo "${failures} Slugger issue reporting action(s) failed after ${successes} succeeded." >&2
          fi
