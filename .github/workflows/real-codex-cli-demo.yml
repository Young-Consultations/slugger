name: Canonical Real Codex Slugger MVP Demo

on:
  workflow_dispatch:
    inputs:
      retain_diagnostics:
        description: Retain diagnostic artifacts for 14 days
        required: true
        type: boolean
        default: false

concurrency:
  group: real-codex-cli-demo-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare-codex-input:
    name: Prepare deterministic Codex input
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      project_name: hello-codex
      package_name: hello_codex
    steps:
      - name: Check out Slugger
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Render deterministic Codex prompt
        shell: bash
        run: |
          set -euo pipefail
          cat > rendered-codex-prompt.md <<'EOF'
          Generate a Python CLI project in ./generated-demo only.

          Project name: hello-codex
          Package name: hello_codex

          Required command:
          python -m hello_codex.main greet Joseph

          Expected stdout exactly:
          Hello, Joseph!

          Requirements:
          - Use argparse.
          - Implement a greet NAME command.
          - Print exactly Hello, NAME! followed by a newline.
          - Preserve conventional --help behavior with usage output.
          - Use a src layout with package files under src/hello_codex/.
          - Create README.md, pyproject.toml, src/hello_codex/__init__.py, src/hello_codex/main.py, and tests/test_main.py.
          - Use no runtime dependencies.
          - Include at least three pytest tests.
          - Include one test for the exact greet behavior.
          - Do not use the network.
          - Do not use external services.
          - Do not run Git operations.
          - Do not read or write files outside ./generated-demo.
          - Do not modify Slugger source files.
          EOF
      - name: Upload rendered prompt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rendered-codex-prompt-${{ github.run_id }}
          path: rendered-codex-prompt.md
          if-no-files-found: error
          retention-days: 3

  generate-with-codex:
    name: Generate with Codex
    environment: codex-demo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare-codex-input
    permissions:
      contents: read
    steps:
      - name: Check out Slugger
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Download rendered prompt
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: rendered-codex-prompt-${{ github.run_id }}
          path: codex-input
      - name: Run Codex generation
        id: run_codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":workspace"
          prompt-file: codex-input/rendered-codex-prompt.md
          output-file: codex-final-message.txt
      - name: Transfer raw Codex output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: raw-codex-output-${{ github.run_id }}
          path: generated-demo/**
          if-no-files-found: error
          retention-days: 1

  prepare-generated-artifact:
    name: Prepare generated artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare-codex-input, generate-with-codex]
    permissions:
      contents: read
    steps:
      - name: Check out clean Slugger
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Download raw Codex output
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: raw-codex-output-${{ github.run_id }}
          path: generated-demo
      - name: Validate generated directory and write manifest
        shell: bash
        run: |
          set -euo pipefail
          test -d generated-demo
          find generated-demo -path '*/.git/*' -o -path '*/.github/*' | (! grep .)
          python - <<'PY'
          import json
          from pathlib import Path
          from mvp.inventory_manifest import create_manifest, write_manifest
          manifest_path = Path('generated-project-manifest.json')
          write_manifest(Path('generated-demo'), manifest_path)
          manifest = create_manifest(Path('generated-demo'))
          Path('generation-summary.json').write_text(json.dumps({
              'workflow_run_id': '${{ github.run_id }}',
              'project_name': 'hello-codex',
              'package_name': 'hello_codex',
              'artifact_digest': manifest['artifact_digest'],
              'generated_files': len(manifest['entries']),
          }, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
      - name: Upload generated project artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-demo-${{ github.run_id }}
          path: |
            generated-demo/**
            generated-project-manifest.json
          if-no-files-found: error
          retention-days: 3

  verify-generated-demo:
    name: Persist and verify generated demo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare-codex-input, prepare-generated-artifact]
    permissions:
      contents: read
    steps:
      - name: Check out Slugger without credentials
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install Slugger verifier dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Build offline verifier image
        shell: bash
        run: docker build -f docker/mvp-verifier.Dockerfile -t slugger-mvp-verifier:python3.11-pytest .
      - name: Download generated project artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: generated-demo-${{ github.run_id }}
          path: downloaded-artifact
      - name: Run Slugger service with artifact adapter
        shell: bash
        env:
          SLUGGER_HOME: ${{ runner.temp }}/slugger-home
          SLUGGER_MVP_SKIP_PUBLISH: "1"
          SLUGGER_MVP_CODEX_ADAPTER: artifact
          SLUGGER_MVP_CODEX_ARTIFACT_DIR: ${{ github.workspace }}/downloaded-artifact/generated-demo
          SLUGGER_MVP_CODEX_MANIFEST: ${{ github.workspace }}/downloaded-artifact/generated-project-manifest.json
          SLUGGER_MVP_EXTERNAL_GENERATION_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python -m cli.main mvp build \
            "Create a deterministic argparse CLI named hello-codex with greet NAME printing exactly Hello, NAME!." \
            --name hello-codex --repo local/hello-codex --base main > slugger-build-summary.json
          python - <<'PY'
          import json, os
          data = json.loads(open('slugger-build-summary.json', encoding='utf-8').read())
          assert data['status'] == 'ready_to_publish', data
          assert data['publication_skipped'] is True, data
          assert data['external_generation_id'] == os.environ['SLUGGER_MVP_EXTERNAL_GENERATION_ID'], data
          PY
      - name: Verify generated project with restricted container
        shell: bash
        run: |
          set -euo pipefail
          python -m cli.main mvp verify-existing --container \
            --project-dir "$(python - <<'PY'
          import json
          print(json.load(open('slugger-build-summary.json'))['workspace_path'])
          PY
          )" \
            --project-name hello-codex --workspace-root "downloaded-artifact"
      - name: Produce sanitized certification evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p certification
          cp downloaded-artifact/generated-project-manifest.json certification/generated-project-manifest.json
          cp "$(python - <<'PY'
          import json
          print(json.load(open('slugger-build-summary.json'))['workspace_path'] + '/verification-evidence.json')
          PY
          )" certification/verification-evidence.json
          python - <<'PY'
          import json, subprocess
          from pathlib import Path
          build = json.loads(Path('slugger-build-summary.json').read_text(encoding='utf-8'))
          manifest = json.loads(Path('certification/generated-project-manifest.json').read_text(encoding='utf-8'))
          evidence = json.loads(Path('certification/verification-evidence.json').read_text(encoding='utf-8'))
          summary = {
              'repository_commit_sha': '${{ github.sha }}',
              'workflow_run_id': '${{ github.run_id }}',
              'slugger_run_id': build.get('run_id'),
              'project_name': 'hello-codex',
              'package_name': 'hello_codex',
              'manifest_digest': manifest.get('artifact_digest'),
              'generated_inventory_digest': build.get('generated_inventory_digest'),
              'final_status': build.get('status'),
              'exact_functional_output': 'Hello, Joseph!',
              'validation_status': 'passed' if build.get('validation_passed') else 'failed',
              'test_status': 'passed' if build.get('test_passed') else 'failed',
              'smoke_status': 'passed' if build.get('smoke_passed') else 'failed',
              'functional_status': 'passed' if build.get('functional_passed') else 'failed',
              'container_isolation_summary': evidence.get('container_summary'),
              'generated_source_mutation_status': evidence.get('mutation_check_result'),
              'publication_skipped': build.get('publication_skipped'),
              'source_integrity_result': build.get('source_integrity_result'),
          }
          Path('certification/certification-summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
      - name: Upload sanitized certification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: slugger-codex-certification-${{ github.run_id }}
          path: certification/*
          if-no-files-found: error
          retention-days: 14
