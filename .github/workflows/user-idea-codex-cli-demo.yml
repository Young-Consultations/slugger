name: User Idea Codex Slugger MVP Demo

on:
  workflow_dispatch:
    inputs:
      idea:
        description: User idea for the generated Python CLI project
        required: true
        type: string
      project_name:
        description: Human-friendly project name; normalized to lowercase kebab-case (hello-codex is reserved)
        required: true
        type: string
        default: user-idea-cli
      target_repository:
        description: Empty or Slugger-managed sandbox repository for the generated draft PR (owner/repo)
        required: true
        type: string
        default: mightyjoe909/slugger-generated-demos
      retain_diagnostics:
        description: Retain diagnostic artifacts for 14 days
        required: true
        type: boolean
        default: false

concurrency:
  group: user-idea-codex-cli-demo-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare-codex-input:
    name: Prepare deterministic Codex input
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      project_name: ${{ steps.idea_inputs.outputs.project_name }}
      package_name: ${{ steps.idea_inputs.outputs.package_name }}
    steps:
      - name: Check out Slugger
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Validate target repository before Codex
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.SLUGGER_GITHUB_TOKEN }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          TARGET_BASE_BRANCH: main
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "SLUGGER_GITHUB_TOKEN is required to validate the target repository before Codex generation." >&2
            exit 1
          fi
          case "$TARGET_REPOSITORY" in
            */*) ;;
            *) echo "target_repository must use owner/repo form" >&2; exit 1 ;;
          esac
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          repo = os.environ["TARGET_REPOSITORY"]
          branch = os.environ["TARGET_BASE_BRANCH"]
          owner, name = repo.split("/", 1)
          base = "https://api.github.com"
          token = os.environ["GH_TOKEN"]

          def fetch(path):
              request = urllib.request.Request(
                  base + path,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=15) as response:
                  return json.loads(response.read().decode("utf-8"))

          def exists(path):
              try:
                  fetch(path)
                  return True
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return False
                  raise

          try:
              repo_data = fetch(f"/repos/{owner}/{name}")
              if not repo_data.get("permissions", {}).get("push"):
                  raise SystemExit("SLUGGER_GITHUB_TOKEN can read the target repository but does not have push access; grant Contents read/write and Pull requests read/write before Codex generation.")
              fetch(f"/repos/{owner}/{name}/branches/{branch}")
              try:
                  contents = fetch(f"/repos/{owner}/{name}/contents?ref={branch}")
              except urllib.error.HTTPError as exc:
                  if exc.code in {404, 409}:
                      contents = []
                  else:
                      raise
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  raise SystemExit(f"Target repository base branch '{branch}' is missing or unborn; initialize the sandbox repository with an initial commit on {branch} before Codex generation.") from exc
              raise SystemExit(f"Target repository or base branch cannot be accessed before Codex generation: HTTP {exc.code}") from exc

          if contents and not exists(f"/repos/{owner}/{name}/contents/.slugger-run-id?ref={branch}"):
              raise SystemExit("Target repository is not empty and is not Slugger-managed; choose an empty sandbox repository.")
          print(f"Validated target repository {repo} and base branch {branch} before Codex generation.")
          PY
      - name: Render Codex prompt from user idea
        id: idea_inputs
        shell: bash
        env:
          USER_IDEA: ${{ inputs.idea }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from mvp.prompt_renderer import (
              normalize_project_name,
              prompt_inputs,
              render_demo_prompt,
          )
          import os
          submitted_project_name = os.environ["PROJECT_NAME"]
          normalized_project_name = normalize_project_name(submitted_project_name)
          if submitted_project_name != normalized_project_name:
              print("Project name normalized for Codex prompt rendering.")
          inputs = prompt_inputs(normalized_project_name, os.environ["USER_IDEA"])
          Path("rendered-codex-prompt.md").write_text(
              render_demo_prompt(
                  project_name=inputs.project_name,
                  demo_description=inputs.demo_description,
              ),
              encoding="utf-8",
          )
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as out:
              out.write(f"project_name={inputs.project_name}\n")
              out.write(f"package_name={inputs.package_name}\n")
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary:
              summary.write("## Project name normalization\n\n")
              summary.write(f"- Submitted project name: `{submitted_project_name}`\n")
              summary.write(f"- Normalized project name: `{inputs.project_name}`\n")
          PY
      - name: Upload rendered prompt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rendered-codex-prompt-${{ github.run_id }}
          path: rendered-codex-prompt.md
          if-no-files-found: error
          retention-days: 3

  generate-with-codex:
    name: Generate CLI demo with real Codex
    environment: codex-demo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare-codex-input
    permissions:
      contents: read
    steps:
      - name: Check out Slugger
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Download rendered prompt
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: rendered-codex-prompt-${{ github.run_id }}
          path: codex-input
      - name: Validate required Codex secret
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY is not configured on the protected codex-demo environment." >&2
            exit 1
          fi
          echo "Codex environment secret is configured."
      - name: Run Codex generation
        id: run_codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":workspace"
          prompt-file: codex-input/rendered-codex-prompt.md
          output-file: codex-final-message.txt
      - name: Transfer raw Codex output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: raw-codex-output-${{ github.run_id }}
          path: generated-demo/**
          if-no-files-found: error
          retention-days: 1

  prepare-generated-artifact:
    name: Package generated CLI demo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare-codex-input, generate-with-codex]
    permissions:
      contents: read
    steps:
      - name: Check out clean Slugger
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Download raw Codex output
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: raw-codex-output-${{ github.run_id }}
          path: raw-generated-demo
      - name: Validate generated directory and write manifest
        shell: bash
        run: |
          set -euo pipefail
          test -d "raw-generated-demo"
          python - <<'PY'
          import json
          from pathlib import Path
          from mvp.inventory_manifest import sanitize_protected_artifact, write_protected_manifest, create_protected_manifest, verify_protected_manifest
          raw = Path("raw-generated-demo")
          sanitized = Path("generated-demo")
          manifest_path = Path("generated-project-manifest.json")
          manifest = sanitize_protected_artifact(raw, sanitized)
          write_protected_manifest(sanitized, manifest_path)
          verify_protected_manifest(sanitized, manifest_path)
          manifest = create_protected_manifest(sanitized)
          summary = {
              "workflow_run_id": "${{ github.run_id }}",
              "project_name": "${{ needs.prepare-codex-input.outputs.project_name }}",
              "package_name": "${{ needs.prepare-codex-input.outputs.package_name }}",
              "generated_dir": "generated-demo",
              "generated_files": len(manifest["entries"]),
              "artifact_digest": manifest["artifact_digest"],
          }
          Path("generation-summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
      - name: Write artifact run instructions
        shell: bash
        run: |
          set -euo pipefail
          cat > MVP_ARTIFACT_README.md <<'EOF'
          # Slugger MVP CLI Demo Artifact

          This artifact contains the generated user-idea Python CLI demo and sanitized validation metadata.

          ## Run locally

          ```bash
          cd generated-demo
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
          python -m pytest -q
          python -m ${{ needs.prepare-codex-input.outputs.package_name }}.main --help
          ```

          Expected output:

          ```text
          usage
          ```

          Do not add secrets to this directory. Virtual environments and caches are intentionally excluded from the protected manifest.
          EOF
      - name: Upload generated project artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-demo-${{ github.run_id }}
          path: |
            generated-demo/**
            generated-project-manifest.json
            generation-summary.json
            MVP_ARTIFACT_README.md
          if-no-files-found: error
          retention-days: 3

  verify-generated-demo:
    name: Validate generated CLI demo and publish draft PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare-codex-input, prepare-generated-artifact]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out Slugger without credentials
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install Slugger verifier dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Build offline verifier image
        shell: bash
        run: docker build -f docker/mvp-verifier.Dockerfile -t slugger-mvp-verifier:python3.11-pytest .
      - name: Download generated project artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: generated-demo-${{ github.run_id }}
          path: downloaded-artifact
      - name: Run Slugger service with artifact adapter
        shell: bash
        env:
          BUILD_IDEA: ${{ inputs.idea }}
          SLUGGER_HOME: ${{ runner.temp }}/slugger-home
          SLUGGER_MVP_SKIP_PUBLISH: "1"
          SLUGGER_MVP_ARTIFACT_DIR: ${{ github.workspace }}/downloaded-artifact/generated-demo
          SLUGGER_MVP_ARTIFACT_MANIFEST: ${{ github.workspace }}/downloaded-artifact/generated-project-manifest.json
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
        run: |
          set -euo pipefail
          python -m cli.main mvp build \
            "$BUILD_IDEA" \
            --name "${{ needs.prepare-codex-input.outputs.project_name }}" \
            --repo "$TARGET_REPOSITORY" \
            --base main \
            > slugger-build-summary.tmp.json \
            2> slugger-build-error.log
          python -m json.tool slugger-build-summary.tmp.json >/dev/null
          mv slugger-build-summary.tmp.json slugger-build-summary.json
          python - <<'PY'
          import json
          from pathlib import Path
          from mvp.inventory_manifest import verify_protected_manifest
          data = json.loads(Path("slugger-build-summary.json").read_text(encoding="utf-8"))
          assert data["status"] in {"ready_to_publish", "completed"}, data
          assert data["publication_skipped"] is True, data
          assert data["validation_passed"] is True, data
          assert data["test_passed"] is True, data
          assert data["smoke_passed"] is True, data
          assert data["functional_passed"] is False, data
          verify_protected_manifest(Path("downloaded-artifact/generated-demo"), Path("downloaded-artifact/generated-project-manifest.json"))
          PY
      - name: Verify generated project with restricted container
        shell: bash
        env:
          PROJECT_NAME: ${{ needs.prepare-codex-input.outputs.project_name }}
        run: |
          set -euo pipefail
          # Verify the sanitized artifact downloaded from the prepare-generated-artifact job.
          # The Slugger build workspace may contain post-build runtime files such as
          # virtualenv symlinks, which are intentionally outside the protected manifest.
          PROJECT_DIR="downloaded-artifact/generated-demo"
          WORKSPACE_ROOT="downloaded-artifact"
          python -m cli.main mvp verify-existing --container --project-dir "$PROJECT_DIR" --project-name "$PROJECT_NAME" --workspace-root "$WORKSPACE_ROOT" --evidence-file "$WORKSPACE_ROOT/verification-evidence.json"
      - name: Publish or update draft pull request
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.SLUGGER_GITHUB_TOKEN }}
          SLUGGER_HOME: ${{ runner.temp }}/slugger-home
          SLUGGER_PUBLICATION_DIAGNOSTICS: publication-diagnostics.json
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
        run: |
          set -euo pipefail
          : > publication-error.log
          write_publication_diagnostic() {
            local phase="$1"
            local message="$2"
            PHASE="$phase" MESSAGE="$message" python - <<'PY'
          import json
          import os
          from pathlib import Path
          diagnostic = {
              "phase": os.environ["PHASE"],
              "message": os.environ["MESSAGE"][:500],
          }
          Path("publication-diagnostics.json").write_text(json.dumps([diagnostic], indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          }
          if [ -z "${GH_TOKEN:-}" ]; then
            message="SLUGGER_GITHUB_TOKEN is required for the final publication step."
            echo "$message" >&2
            echo "$message" > publication-error.log
            write_publication_diagnostic "pre_publication_token" "$message"
            exit 1
          fi
          if ! python - <<'PY' 2>> publication-error.log
          import json
          from pathlib import Path
          from mvp.inventory_manifest import verify_protected_manifest
          verify_protected_manifest(
              Path("downloaded-artifact/generated-demo"),
              Path("downloaded-artifact/generated-project-manifest.json"),
          )
          summary = json.loads(Path("slugger-build-summary.json").read_text(encoding="utf-8"))
          assert summary["status"] == "ready_to_publish", summary
          assert summary["publication_skipped"] is True, summary
          PY
          then
            write_publication_diagnostic "pre_publication_manifest" "Pre-publication manifest or summary check failed. See publication-error.log."
            exit 1
          fi
          RUN_ID="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('slugger-build-summary.json').read_text(encoding='utf-8'))['run_id'])
          PY
          )"
          set +e
          python -m cli.main mvp publish "$RUN_ID" > publication-summary.tmp.json 2> publication-error.log
          publish_rc=$?
          set -e
          if [ -s publication-summary.tmp.json ]; then
            python -m json.tool publication-summary.tmp.json >/dev/null
            mv publication-summary.tmp.json publication-summary.json
          else
            rm -f publication-summary.tmp.json
          fi
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("publication-diagnostics.json")
          if not path.exists():
              path.write_text("[]\n", encoding="utf-8")
          data = json.loads(path.read_text(encoding="utf-8"))
          if not isinstance(data, list):
              raise SystemExit("publication diagnostics must be a list")
          PY
          exit "$publish_rc"
      - name: Assemble success artifact
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p mvp-artifact
          cp -R downloaded-artifact/generated-demo mvp-artifact/generated-demo
          rm -f mvp-artifact/generated-demo/verification-evidence.json
          cp downloaded-artifact/generated-project-manifest.json mvp-artifact/generated-project-manifest.json
          cp downloaded-artifact/generation-summary.json mvp-artifact/generation-summary.json
          cp downloaded-artifact/MVP_ARTIFACT_README.md mvp-artifact/MVP_ARTIFACT_README.md
          cp downloaded-artifact/verification-evidence.json mvp-artifact/verification-evidence.json
          cp publication-summary.json mvp-artifact/publication-summary.json
          python - <<'PY'
          from pathlib import Path
          from mvp.inventory_manifest import verify_protected_manifest
          verify_protected_manifest(
              Path("mvp-artifact/generated-demo"),
              Path("mvp-artifact/generated-project-manifest.json"),
          )
          forbidden = [".venv", "__pycache__", ".pytest_cache", "slugger-home", ".git"]
          found = [str(path) for name in forbidden for path in Path("mvp-artifact").rglob(name)]
          if found:
              raise SystemExit("Forbidden artifact content: " + ", ".join(sorted(found)))
          PY
      - name: Upload success artifact
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: slugger-user-idea-cli-demo-${{ github.run_id }}
          path: mvp-artifact/**
          if-no-files-found: error
          retention-days: 14
      - name: Upload verifier diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: verifier-diagnostics-${{ github.run_id }}
          path: |
            slugger-build-summary.json
            slugger-build-error.log
            publication-summary.json
            publication-error.log
            publication-diagnostics.json
            downloaded-artifact/verification-evidence.json
            downloaded-artifact/generated-project-manifest.json
          if-no-files-found: ignore
          retention-days: ${{ inputs.retain_diagnostics && 14 || 3 }}

  publish-certification-diagnostics:
    name: Publish MVP certification diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    needs:
      - prepare-codex-input
      - generate-with-codex
      - prepare-generated-artifact
      - verify-generated-demo
    permissions:
      contents: read
    steps:
      - name: Download generated artifact diagnostics
        if: needs.prepare-generated-artifact.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: generated-demo-${{ github.run_id }}
          path: certification-input/generated-artifact
      - name: Download verifier diagnostics
        if: needs.verify-generated-demo.result != 'skipped'
        continue-on-error: true
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: verifier-diagnostics-${{ github.run_id }}
          path: certification-input/verifier-diagnostics
      - name: Produce sanitized certification evidence
        if: always()
        shell: bash
        env:
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          REPOSITORY_COMMIT_SHA: ${{ github.sha }}
          PREPARE_CODEX_INPUT_RESULT: ${{ needs.prepare-codex-input.result }}
          GENERATE_WITH_CODEX_RESULT: ${{ needs.generate-with-codex.result }}
          PREPARE_GENERATED_ARTIFACT_RESULT: ${{ needs.prepare-generated-artifact.result }}
          VERIFY_GENERATED_DEMO_RESULT: ${{ needs.verify-generated-demo.result }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import shutil
          from pathlib import Path
          cert = Path("certification")
          cert.mkdir(exist_ok=True)
          job_results = {
              "prepare-codex-input": "${{ needs.prepare-codex-input.result }}",
              "generate-with-codex": "${{ needs.generate-with-codex.result }}",
              "prepare-generated-artifact": "${{ needs.prepare-generated-artifact.result }}",
              "verify-generated-demo": "${{ needs.verify-generated-demo.result }}",
          }
          result = "passed" if all(value == "success" for value in job_results.values()) else "failed"
          failed_phase = None
          for name, value in job_results.items():
              if value != "success":
                  failed_phase = name
                  break
          error_summary = "" if result == "passed" else f"Job {failed_phase} concluded with {job_results[failed_phase]}"
          slugger_run_id = None
          manifest_digest = None
          build = Path("certification-input/verifier-diagnostics/slugger-build-summary.json")
          publication = Path("certification-input/verifier-diagnostics/publication-summary.json")
          publication_diagnostics = Path("certification-input/verifier-diagnostics/publication-diagnostics.json")
          verification = Path("certification-input/verifier-diagnostics/verification-evidence.json")
          manifest_candidates = [
              Path("certification-input/verifier-diagnostics/generated-project-manifest.json"),
              Path("certification-input/generated-artifact/generated-project-manifest.json"),
          ]
          if build.is_file():
              try:
                  data = json.loads(build.read_text(encoding="utf-8"))
                  slugger_run_id = data.get("run_id")
                  if data.get("status") not in {"ready_to_publish", "completed"} and result == "passed":
                      result = "failed"
                      failed_phase = "slugger_build"
                      error_summary = str(data.get("error_details") or "Slugger build did not pass")[:500]
              except Exception as exc:
                  result = "failed"
                  failed_phase = "slugger_build"
                  error_summary = f"Could not parse slugger build summary: {exc}"[:500]
          for manifest in manifest_candidates:
              if manifest.is_file():
                  try:
                      manifest_digest = json.loads(manifest.read_text(encoding="utf-8")).get("artifact_digest")
                  except Exception:
                      manifest_digest = None
                  break
          summary = {
              "workflow_run_id": "${{ github.run_id }}",
              "repository_commit_sha": "${{ github.sha }}",
              "result": result,
              "failed_phase": failed_phase,
              "error_summary": error_summary,
              "job_results": job_results,
              "slugger_run_id": slugger_run_id,
              "manifest_digest": manifest_digest,
          }
          (cert / "certification-summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          for src in [build, publication, publication_diagnostics, verification, *manifest_candidates]:
              if src.is_file():
                  shutil.copy2(src, cert / src.name)
          PY
      - name: Upload sanitized certification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 resolved from baseline run
        with:
          name: slugger-user-idea-codex-certification-${{ github.run_id }}
          path: certification/**
          if-no-files-found: error
          retention-days: ${{ inputs.retain_diagnostics && 14 || 3 }}
