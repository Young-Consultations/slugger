name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint, type-check, test, and package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type check
        run: python -m mypy agents cli core materializer models orchestrator providers services validators workflow

      - name: Run tests
        run: python -m pytest tests/

      - name: Build package
        run: python -m build

      - name: Smoke test installed wheel
        run: |
          python -m venv ci-wheel-smoke
          . ci-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          pip install dist/*.whl
          slugger status
