name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/mvp-release-checklist.md

permissions:
  contents: write

jobs:
  publish-v0-1-0:
    name: Publish Slugger v0.1.0
    runs-on: ubuntu-latest
    # Only run once when the completed checklist lands on main
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check checklist is complete
        id: check
        run: |
          if grep -q '- \[ \]' docs/mvp-release-checklist.md; then
            echo "Checklist has open items — skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Checklist is fully complete."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create annotated tag v0.1.0
        if: steps.check.outputs.release == 'true'
        run: |
          if git ls-remote --tags origin | grep -q 'refs/tags/v0.1.0'; then
            echo "Tag v0.1.0 already exists — skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a v0.1.0 HEAD -m "Slugger MVP v0.1.0"
            git push origin refs/tags/v0.1.0
            echo "Tag v0.1.0 created and pushed."
          fi

      - name: Publish GitHub Release v0.1.0
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release v0.1.0 already exists — skipping."
            exit 0
          fi
          gh release create v0.1.0 \
            --repo "$GITHUB_REPOSITORY" \
            --title "Slugger v0.1.0" \
            --notes "## Slugger v0.1.0 is the first certified MVP release of the AI Software Factory.
                ### MVP capabilities
                - Generates a constrained Python CLI project using real Codex.
                - Uses a protected GitHub Actions environment for Codex credentials.
                - Sanitizes generated files and verifies a SHA-256 protected manifest.
                - Validates packaging, dependencies, project structure, and source safety.
                - Installs generated projects in an isolated environment.
                - Runs generated pytest tests and deterministic smoke checks.
                - Verifies generated code in a restricted, network-disabled container.
                - Produces downloadable success and certification artifacts.
                ### Certified execution
                - Workflow run: \`29601077462\`
                - Certified branch: \`main\`
                - Certified commit: \`685ae1b63313f3401d8876f9210f09c21186b7f0\`
                - Success artifact: \`slugger-mvp-cli-demo-29601077462\`
                - Certification artifact: \`slugger-codex-certification-29601077462\`
                - Manual release validation: completed and attested by the repository owner
                ### Known limitations
                - The MVP supports a constrained Python CLI generation path.
                - The canonical release-validation workflow is manually triggered.
                - Generated code requires human review before production use.
                - Additional templates, automatic release assets, and policy packs are deferred."
          echo "GitHub Release v0.1.0 published."
