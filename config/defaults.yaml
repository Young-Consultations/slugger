environment: development
providers:
  default_provider: mock
  configs:
    mock:
      provider_type: mock
      model: mock-model
    openai:
      provider_type: openai
      model: gpt-4o
      api_key_env: OPENAI_API_KEY
    anthropic:
      provider_type: anthropic
      model: claude-3-5-sonnet-20241022
      api_key_env: ANTHROPIC_API_KEY
agents:
  default_timeout_seconds: 60
  enabled_categories:
    - planning
    - architecture
    - development
    - qa
    - operations
    - support
workflow:
  recipe_directory: workflow/recipes
  max_retries: 2
observability:
  enabled: true
  log_level: INFO
  json_logs: true
memory:
  backend: in_memory
  storage_path: memory/store.json
github:
  token_env: GITHUB_TOKEN
  owner: ''
  repo: ''
canva:
  access_token_env: CANVA_API_TOKEN
  base_url: https://api.canva.com/rest/v1
plugin_directories:
  - plugins
